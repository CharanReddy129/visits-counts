apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visits-counter-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CharanReddy129/visits-counts.git
    targetRevision: main
    path: ./argo_rollouts/canary
  destination:
    server: https://kubernetes.default.svc
    namespace: webapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true