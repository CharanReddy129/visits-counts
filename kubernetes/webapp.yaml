apiVersion: apps/v1
kind: Deployment
metadata:
  name: visits-counter
  annotations:
    argocd.argoproj.io/sync-waves: "1"
spec:
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: visits-counter
        image: charanreddy12/visits-counter:3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "150m"
        env:
          - name: REDIS_URL
            value: redis://redis:6379
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: visits-counter-service
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31100