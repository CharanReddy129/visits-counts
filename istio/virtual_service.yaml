apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: visits-counter-vs
spec:
  hosts:
    - "127.0.0.1.sslip.io"
  gateways:
    - visits-counter-gateway
  http:
    - route:
        - destination:
            host: visits-counter-service
            port:
              number: 80