apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: visits-counter-bluegreen
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: bluegreen
  template:
    metadata:
      labels:
        app: bluegreen
    spec:
      containers:
      - name: visits-counter
        image: charanreddy12/visits-counter:4
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "150m"
        env:
          - name: REDIS_URL
            value: redis://redis:6379
  strategy:
    blueGreen:
      activeService: visits-counter-active
      previewService: visits-counter-preview
      autoPromotionEnabled: true
      previewReplicaCount: 2
      scaleDownDelaySeconds: 20
      autoPromotionSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: visits-counter-active
spec:
  type: NodePort
  selector:
    app: bluegreen
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31100

---
apiVersion: v1
kind: Service
metadata:
  name: visits-counter-preview
spec:
  type: NodePort
  selector:
    app: bluegreen
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30011