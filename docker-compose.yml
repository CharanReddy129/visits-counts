services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-app
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis-server:6379
    depends_on: 
      - redis-server

  redis-server:
    image: redis
    container_name: redis-server
