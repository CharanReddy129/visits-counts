<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visits Counter</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Welcome to the Visits Counter!</h1>
    <div class="visits" id="visits">0</div>
    <div class="desc">Number of visits to this page</div>
  </div>
  <script>
    fetch('/visits')
      .then(res => res.json())
      .then(data => {
        document.getElementById('visits').textContent = data.visits;
      });
  </script>
</body>
</html>
